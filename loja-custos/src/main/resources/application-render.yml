# Perfil ativo no Render (SPRING_PROFILES_ACTIVE=render)
# H2 em memória: no disco efêmero do Render os dados sumiriam mesmo com arquivo;
# para persistir no futuro, use PostgreSQL (addon Render) e JDBC_URL.

spring:
  datasource:
    url: jdbc:h2:mem:lojacustos;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
